name: CI

# PR: no paths filter so `labeled` / `unlabeled` (e.g. ci:windows) still trigger runs.
# Push to main stays path-filtered to avoid noise.
on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "pytest.ini"
      - "Makefile"
      - ".github/workflows/ci.yml"

  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------
# MATRIX: Ubuntu only by default (push and PR). Windows runs only when a PR has
# label `ci:windows`; add/remove that label (pull_request labeled/unlabeled) to re-run CI.
# Kubernetes local tests: push to main, PR title contains k8s/kubernetes, or label `ci:k8s`.
# ---------------------------------------------------------------
jobs:
  matrix-prep:
    runs-on: ubuntu-latest
    outputs:
      os_json: ${{ steps.set.outputs.os_json }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            labels="${{ join(github.event.pull_request.labels.*.name, ',') }}"
            case ",${labels}," in
              *,ci:windows,*) echo 'os_json=["ubuntu-latest","windows-latest"]' >> "$GITHUB_OUTPUT" ;;
              *) echo 'os_json=["ubuntu-latest"]' >> "$GITHUB_OUTPUT" ;;
            esac
          else
            echo 'os_json=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          fi

# ---------------------------------------------------------------
# QUALITY CHECKS (lint + format)
# ---------------------------------------------------------------
  quality:
    name: quality (${{ matrix.os }})
    needs: [matrix-prep]
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.matrix-prep.outputs.os_json) }}

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    continue-on-error: ${{ matrix.os == 'windows-latest' }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: python -m ruff check app/ tests/

      - name: Format check
        run: python -m ruff format --check app/ tests/

# ---------------------------------------------------------------
# TYPECHECK
# ---------------------------------------------------------------
  typecheck:
    name: typecheck (${{ matrix.os }})
    needs: [matrix-prep]
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.matrix-prep.outputs.os_json) }}

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    continue-on-error: ${{ matrix.os == 'windows-latest' }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Typecheck
        run: python -m mypy app/

# ---------------------------------------------------------------
# TESTS (MAIN CI GATE)
# ---------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    needs: [matrix-prep, quality, typecheck]
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.matrix-prep.outputs.os_json) }}

    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      JWT_TOKEN: ${{ secrets.JWT_TOKEN }}
      TRACER_ORG_ID: ${{ secrets.TRACER_ORG_ID }}
      TRACER_WEB_APP_URL: ${{ secrets.TRACER_WEB_APP_URL }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
      LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
      LANGSMITH_TRACING: ${{ secrets.LANGSMITH_TRACING }}
      GRAFANA_READ_TOKEN: ${{ secrets.GRAFANA_READ_TOKEN }}
      GCLOUD_HOSTED_METRICS_ID: ${{ secrets.GCLOUD_HOSTED_METRICS_ID }}
      GCLOUD_HOSTED_METRICS_URL: ${{ secrets.GCLOUD_HOSTED_METRICS_URL }}
      GCLOUD_HOSTED_LOGS_ID: ${{ secrets.GCLOUD_HOSTED_LOGS_ID }}
      GCLOUD_HOSTED_LOGS_URL: ${{ secrets.GCLOUD_HOSTED_LOGS_URL }}
      GCLOUD_RW_API_KEY: ${{ secrets.GCLOUD_RW_API_KEY }}
      GCLOUD_OTLP_ENDPOINT: ${{ secrets.GCLOUD_OTLP_ENDPOINT }}
      GCLOUD_OTLP_AUTH_HEADER: ${{ secrets.GCLOUD_OTLP_AUTH_HEADER }}
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run safe tests (fork PRs)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == true
        run: >-
          python -m pytest -n auto -v
          --ignore=tests/e2e
          --ignore=tests/synthetic
          -m "not synthetic"

      - name: Run full tests
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        run: >-
          python -m pytest -n auto -v
          --cov=app
          --cov-report=term-missing
          --cov-report=html
          --ignore=tests/e2e/kubernetes_local_alert_simulation
          --ignore=tests/synthetic
          -m "${{ matrix.os == 'windows-latest' && 'not synthetic and not integration' || 'not synthetic' }}"

      - name: Upload coverage
        if: always() && matrix.os == 'ubuntu-latest' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: |
            htmlcov/
            .coverage
          retention-days: 7

# ---------------------------------------------------------------
# KUBERNETES TESTS
# ---------------------------------------------------------------
  test-kubernetes:
    runs-on: ubuntu-latest
    needs: [quality, typecheck]
    continue-on-error: true
    timeout-minutes: 15

    if: >-
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        (
          contains(github.event.pull_request.title, 'k8s') ||
          contains(github.event.pull_request.title, 'kubernetes') ||
          contains(github.event.pull_request.labels.*.name, 'ci:k8s')
        )
      )

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run Kubernetes tests
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: python -m tests.e2e.kubernetes.test_local

# ---------------------------------------------------------------
# THOROUGH E2E (MAIN ONLY)
# ---------------------------------------------------------------
  test-thorough:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cloudwatch-demo
            command: python3 -m tests.e2e.cloudwatch_demo.test_aws
          - name: s3-failed-python
            command: python3 -m tests.e2e.s3_failed_python_on_linux.test_aws
          - name: upstream-lambda
            command: python3 -m tests.e2e.upstream_lambda.test_agent_e2e
          - name: prefect-ecs-fargate
            command: python3 -m tests.e2e.upstream_prefect_ecs_fargate.test_agent_e2e
          - name: flink-ecs
            command: python3 -m tests.e2e.upstream_apache_flink_ecs.test_agent_e2e

    name: test-thorough (${{ matrix.name }})

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      JWT_TOKEN: ${{ secrets.JWT_TOKEN }}
      TRACER_ORG_ID: ${{ secrets.TRACER_ORG_ID }}
      TRACER_WEB_APP_URL: ${{ secrets.TRACER_WEB_APP_URL }}
      TRACER_API_URL: ${{ secrets.TRACER_API_URL }}
      TRACER_INGEST_TOKEN: ${{ secrets.TRACER_INGEST_TOKEN }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
      LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
      LANGSMITH_TRACING: ${{ secrets.LANGSMITH_TRACING }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      GRAFANA_READ_TOKEN: ${{ secrets.GRAFANA_READ_TOKEN }}
      GCLOUD_HOSTED_METRICS_ID: ${{ secrets.GCLOUD_HOSTED_METRICS_ID }}
      GCLOUD_HOSTED_METRICS_URL: ${{ secrets.GCLOUD_HOSTED_METRICS_URL }}
      GCLOUD_HOSTED_LOGS_ID: ${{ secrets.GCLOUD_HOSTED_LOGS_ID }}
      GCLOUD_HOSTED_LOGS_URL: ${{ secrets.GCLOUD_HOSTED_LOGS_URL }}
      GCLOUD_RW_API_KEY: ${{ secrets.GCLOUD_RW_API_KEY }}
      GCLOUD_OTLP_ENDPOINT: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      CLOUDWATCH_VERIFY_LOGS: ${{ matrix.name == 'cloudwatch-demo' && '0' || '1' }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Install tracer CLI
        run: |
          curl -sSL https://install.tracer.cloud | CLI_BRANCH=dev sh -s user_36fbN6K6FwEgJFHsQv1pUByo8K6

      - name: Initialize tracer (optional)
        run: |
          sudo tracer init --token ${{ secrets.JWT_TOKEN }}
        continue-on-error: true
        timeout-minutes: 2

      - name: Run test
        run: ${{ matrix.command }}
        timeout-minutes: 30
