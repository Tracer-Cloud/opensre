name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "pytest.ini"
      - "Makefile"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "pytest.ini"
      - "Makefile"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  #  Fast CI (PR + main) → Ubuntu only, everything in one job
  # ---------------------------------------------------------------
  ci-fast:
    name: ci-fast (ubuntu)
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check app/ tests/

      - name: Format check
        run: python -m ruff format --check app/ tests/

      - name: Typecheck (mypy)
        run: python -m mypy app/

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_TOKEN: ${{ secrets.JWT_TOKEN }}
          TRACER_ORG_ID: ${{ secrets.TRACER_ORG_ID }}
          TRACER_WEB_APP_URL: ${{ secrets.TRACER_WEB_APP_URL }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
          LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
          LANGSMITH_TRACING: ${{ secrets.LANGSMITH_TRACING }}
        run: >-
          python -m pytest -n auto -v --cov=app --cov-report=term-missing
          --ignore=tests/e2e/kubernetes_local_alert_simulation
          --ignore=tests/synthetic
          -m "not synthetic"

  # ---------------------------------------------------------------
  #  Windows CI (non-blocking, push only, test only)
  # ---------------------------------------------------------------
  ci-windows:
    name: ci-windows (test only)
    if: github.event_name == 'push'
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run tests (Windows)
        run: python -m pytest -v -m "not synthetic"

  # ---------------------------------------------------------------
  # Kubernetes tests (unchanged)
  # ---------------------------------------------------------------
  test-kubernetes:
    runs-on: ubuntu-latest
    needs: [ci-fast]
    continue-on-error: true
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, 'k8s') ||
      contains(github.event.pull_request.title, 'kubernetes')

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run Kubernetes tests
        run: python -m tests.e2e.kubernetes.test_local

  # ---------------------------------------------------------------
  # Thorough tests (unchanged, gated)
  # ---------------------------------------------------------------
  test-thorough:
    runs-on: ubuntu-latest
    needs: [ci-fast]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cloudwatch-demo
            command: python3 -m tests.e2e.cloudwatch_demo.test_aws
          - name: s3-failed-python
            command: python3 -m tests.e2e.s3_failed_python_on_linux.test_aws

    name: test-thorough (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run thorough test
        run: ${{ matrix.command }}
