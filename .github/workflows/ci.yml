name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "pytest.ini"
      - "Makefile"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "pytest.ini"
      - "Makefile"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-fast:
    name: ci-fast (ubuntu)
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: python -m ruff check app/ tests/

      - name: Format check
        run: python -m ruff format --check app/ tests/

      - name: Type check
        run: python -m mypy app/

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_TOKEN: ${{ secrets.JWT_TOKEN }}
          TRACER_ORG_ID: ${{ secrets.TRACER_ORG_ID }}
          TRACER_WEB_APP_URL: ${{ secrets.TRACER_WEB_APP_URL }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
          LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
          LANGSMITH_TRACING: ${{ secrets.LANGSMITH_TRACING }}
          GRAFANA_READ_TOKEN: ${{ secrets.GRAFANA_READ_TOKEN }}
          GCLOUD_HOSTED_METRICS_ID: ${{ secrets.GCLOUD_HOSTED_METRICS_ID }}
          GCLOUD_HOSTED_METRICS_URL: ${{ secrets.GCLOUD_HOSTED_METRICS_URL }}
          GCLOUD_HOSTED_LOGS_ID: ${{ secrets.GCLOUD_HOSTED_LOGS_ID }}
          GCLOUD_HOSTED_LOGS_URL: ${{ secrets.GCLOUD_HOSTED_LOGS_URL }}
          GCLOUD_RW_API_KEY: ${{ secrets.GCLOUD_RW_API_KEY }}
          GCLOUD_OTLP_ENDPOINT: ${{ secrets.GCLOUD_OTLP_ENDPOINT }}
          GCLOUD_OTLP_AUTH_HEADER: ${{ secrets.GCLOUD_OTLP_AUTH_HEADER }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ""
        run: >-
          python -m pytest -n auto -v
          --cov=app --cov-report=term-missing --cov-report=html
          --ignore=tests/e2e/kubernetes_local_alert_simulation
          --ignore=tests/synthetic
          -m "not synthetic"
        timeout-minutes: 15

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            .coverage
          retention-days: 7

  ci-windows:
    name: ci-windows (unit smoke)
    if: github.event_name == 'push'
    runs-on: windows-latest
    continue-on-error: true
    env:
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run unit tests only (no secrets)
        run: python -m pytest -v -m "not synthetic and not integration"
        timeout-minutes: 10

  test-kubernetes:
    runs-on: ubuntu-latest
    needs: [ci-fast]
    continue-on-error: true
    if: >-
      github.event_name == 'push' ||
      contains(github.event.pull_request.title, 'k8s') ||
      contains(github.event.pull_request.title, 'kubernetes')

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run Kubernetes tests
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: python -m tests.e2e.kubernetes.test_local
        timeout-minutes: 10

  test-thorough:
    runs-on: ubuntu-latest
    needs: [ci-fast]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cloudwatch-demo
            command: python3 -m tests.e2e.cloudwatch_demo.test_aws
          - name: s3-failed-python
            command: python3 -m tests.e2e.s3_failed_python_on_linux.test_aws

    name: test-thorough (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run thorough test
        env:
          AWS_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_TOKEN: ${{ secrets.JWT_TOKEN }}
          TRACER_ORG_ID: ${{ secrets.TRACER_ORG_ID }}
          TRACER_WEB_APP_URL: ${{ secrets.TRACER_WEB_APP_URL }}
          TRACER_INGEST_TOKEN: ${{ secrets.TRACER_INGEST_TOKEN }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_ENDPOINT: ${{ secrets.LANGSMITH_ENDPOINT }}
          LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
          LANGSMITH_TRACING: ${{ secrets.LANGSMITH_TRACING }}
          CLOUDWATCH_VERIFY_LOGS: ${{ matrix.name == 'cloudwatch-demo' && '0' || '1' }}
          GRAFANA_READ_TOKEN: ${{ secrets.GRAFANA_READ_TOKEN }}
          GCLOUD_HOSTED_METRICS_ID: ${{ secrets.GCLOUD_HOSTED_METRICS_ID }}
          GCLOUD_HOSTED_METRICS_URL: ${{ secrets.GCLOUD_HOSTED_METRICS_URL }}
          GCLOUD_HOSTED_LOGS_ID: ${{ secrets.GCLOUD_HOSTED_LOGS_ID }}
          GCLOUD_HOSTED_LOGS_URL: ${{ secrets.GCLOUD_HOSTED_LOGS_URL }}
          GCLOUD_RW_API_KEY: ${{ secrets.GCLOUD_RW_API_KEY }}
          GCLOUD_OTLP_ENDPOINT: ${{ secrets.GCLOUD_OTLP_ENDPOINT }}
          GCLOUD_OTLP_AUTH_HEADER: ${{ secrets.GCLOUD_OTLP_AUTH_HEADER }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ""
          PYTHONUTF8: "1"
        run: ${{ matrix.command }}
        timeout-minutes: 15
