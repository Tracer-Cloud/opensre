name: Trigger K8s Alert

on:
  workflow_dispatch:
    inputs:
      verify:
        description: "Verify logs in Datadog + post to Slack"
        type: boolean
        default: true
  schedule:
    - cron: "0 9 * * 1"  # every Monday 9am UTC

jobs:
  trigger-alert:
    runs-on: ubuntu-latest
    env:
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
      DD_SITE: datadoghq.com
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_DEVS_ALERTS_CHANNEL_ID: C09S7GDG60J
      TRIGGER_API_URL: https://dowvqoqx85.execute-api.us-east-1.amazonaws.com/prod

    steps:
      - uses: actions/checkout@v4

      - name: Trigger pipeline failure via API (~10s)
        id: trigger
        run: |
          echo "trigger_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"
          response=$(curl -sf -X POST "$TRIGGER_API_URL/trigger?inject_error=true")
          echo "response=$response"
          echo "pipeline_run_id=$(echo $response | python3 -c 'import sys,json; print(json.load(sys.stdin)["pipeline_run_id"])')" >> "$GITHUB_OUTPUT"
          echo "s3_key=$(echo $response | python3 -c 'import sys,json; print(json.load(sys.stdin)["s3_key"])')" >> "$GITHUB_OUTPUT"

      - name: Report trigger result
        run: |
          echo "Pipeline run: ${{ steps.trigger.outputs.pipeline_run_id }}"
          echo "S3 key: ${{ steps.trigger.outputs.s3_key }}"

      - name: Set up Python
        if: ${{ inputs.verify == true || github.event_name == 'schedule' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install project
        if: ${{ inputs.verify == true || github.event_name == 'schedule' }}
        run: pip install -q -e .

      - name: Verify Datadog + Slack (~2 min)
        if: ${{ inputs.verify == true || github.event_name == 'schedule' }}
        run: |
          python -m tests.test_case_kubernetes.trigger_alert \
            --verify-only \
            --since-epoch ${{ steps.trigger.outputs.trigger_epoch }}
