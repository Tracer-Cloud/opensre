# Optional Kubernetes local tests when PR label `ci:k8s` is present.
# Separate workflow + concurrency group so Windows label runs are not cancelled.

name: CI Labels (k8s)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

concurrency:
  group: ci-labels-k8s-${{ github.ref }}
  cancel-in-progress: true

jobs:
  k8s-test:
    if: contains(github.event.pull_request.labels.*.name, 'ci:k8s')
    name: k8s label test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run Kubernetes tests
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: python -m tests.e2e.kubernetes.test_local
