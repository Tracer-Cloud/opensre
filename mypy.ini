[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = False

# Ignore boto3 import errors - stubs are installed but mypy needs explicit config
[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-kubernetes]
ignore_missing_imports = True

[mypy-kubernetes.*]
ignore_missing_imports = True

[mypy-kubernetes.client.exceptions]
ignore_missing_imports = True

[mypy-requests]
ignore_missing_imports = True

[mypy-questionary]
ignore_missing_imports = True

[mypy-questionary.*]
ignore_missing_imports = True

# Per-module overrides
[mypy-app.tools.utils.data_validation]
check_untyped_defs = False

# BaseTool subclasses intentionally use explicit signatures in run() for type
# safety and readability. The base abstract run(**kwargs) is a structural
# contract — subclasses narrow it correctly at call sites via extract_params().
[mypy-app.tools.DataDogLogsTool]
disable_error_code = override
[mypy-app.tools.DataDogEventsTool]
disable_error_code = override
